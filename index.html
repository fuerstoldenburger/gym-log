<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#141317">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Gym-Log">
<title>Gym-Log</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%23141317'/%3E%3Cg stroke='%23F5C518' stroke-width='11' stroke-linecap='round'%3E%3Cline x1='55' y1='90' x2='125' y2='90'/%3E%3Cline x1='48' y1='68' x2='48' y2='112'/%3E%3Cline x1='132' y1='68' x2='132' y2='112'/%3E%3Cline x1='34' y1='78' x2='34' y2='102'/%3E%3Cline x1='146' y1='78' x2='146' y2='102'/%3E%3C/g%3E%3C/svg%3E">
<link rel="manifest" href='data:application/manifest+json,{"name":"Gym-Log","short_name":"Gym-Log","start_url":".","display":"standalone","background_color":"%23141317","theme_color":"%23141317","icons":[{"src":"data:image/svg+xml,%253Csvg xmlns=%2527http://www.w3.org/2000/svg%2527 viewBox=%25270 0 180 180%2527%253E%253Crect width=%2527180%2527 height=%2527180%2527 rx=%252740%2527 fill=%2527%2523141317%2527/%253E%253Cg stroke=%2527%2523F5C518%2527 stroke-width=%252711%2527 stroke-linecap=%2527round%2527%253E%253Cline x1=%252755%2527 y1=%252790%2527 x2=%2527125%2527 y2=%252790%2527/%253E%253Cline x1=%252748%2527 y1=%252768%2527 x2=%252748%2527 y2=%2527112%2527/%253E%253Cline x1=%2527132%2527 y1=%252768%2527 x2=%2527132%2527 y2=%2527112%2527/%253E%253C/g%253E%253C/svg%253E","sizes":"any","type":"image/svg+xml"}]}'>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#141317; --surface:#1E1C23; --surface2:#2A2831; --line:#38353F;
    --text:#F2F0EC; --muted:#8C8895; --accent:#F5C518; --pr:#5FD08A; --danger:#E5605C;
    --display:'Oswald','Arial Narrow',system-ui,sans-serif;
    --body:'Inter',system-ui,-apple-system,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--text);font-family:var(--body);-webkit-font-smoothing:antialiased}
  body{min-height:100vh;min-height:100dvh;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input{font-family:inherit}
  ::-webkit-scrollbar{width:0;height:0}
  .tap:active{transform:scale(.96)}
  @media (prefers-reduced-motion:reduce){.tap:active{transform:none}}
  #root{max-width:460px;margin:0 auto;padding:20px 16px 40px}

  .eyebrow{font-family:var(--display);font-size:11px;letter-spacing:2px;color:var(--accent);font-weight:600}
  .header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px}
  .dateBig{font-family:var(--display);font-size:25px;font-weight:600;line-height:1.1;margin-top:2px}
  .top-icons{display:flex;gap:4px;align-items:center}
  .icon-btn{padding:8px;display:flex;align-items:center;justify-content:center}

  .statRow{display:flex;gap:8px;margin-bottom:18px}
  .stat{flex:1;background:var(--surface);border-radius:14px;padding:12px 10px;text-align:center}
  .statN{font-family:var(--display);font-size:26px;font-weight:700;font-variant-numeric:tabular-nums;line-height:1}
  .statL{font-size:10.5px;color:var(--muted);margin-top:4px}

  .searchWrap{display:flex;align-items:center;gap:8px;background:var(--surface);border-radius:12px;padding:0 14px;height:46px;margin-bottom:12px}
  .searchWrap input{flex:1;background:none;border:none;outline:none;color:var(--text);font-size:15px}

  .chips{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:16px}
  .chip{background:var(--surface);color:var(--muted);border:1px solid var(--line);border-radius:20px;padding:7px 14px;font-size:13px;font-weight:500}
  .chip.on{background:var(--accent);color:var(--bg);border-color:var(--accent);font-weight:600}

  .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .exCard{position:relative;background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:16px 14px;text-align:left;min-height:78px;display:flex;flex-direction:column;justify-content:space-between}
  .exCard.add{align-items:center;justify-content:center;border-style:dashed;background:transparent;color:var(--accent)}
  .exName{font-size:15px;font-weight:600;color:var(--text);line-height:1.2}
  .exMeta{font-size:13px;color:var(--muted);margin-top:8px}
  .exMeta b{font-family:var(--display);color:var(--text);font-weight:700}
  .doneDot{position:absolute;top:12px;right:12px;width:8px;height:8px;border-radius:8px;background:var(--pr)}
  .timerIco{position:absolute;top:14px;left:14px;color:var(--muted)}

  .logHeader{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
  .logTitleWrap{margin-bottom:22px}
  .logTitle{font-family:var(--display);font-size:34px;font-weight:700;margin-top:2px;line-height:1.05}
  .lastRef{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--muted);margin-top:10px;flex-wrap:wrap}
  .lastRef b{color:var(--text)}

  .control{background:var(--surface);border-radius:18px;padding:16px 16px 18px;margin-bottom:12px}
  .controlLabel{display:flex;justify-content:space-between;align-items:center;font-family:var(--display);font-size:12px;letter-spacing:1.5px;color:var(--muted);font-weight:500;margin-bottom:8px}
  .stepToggle{display:flex;gap:4px;background:var(--bg);border-radius:10px;padding:3px}
  .stepBtn{color:var(--muted);font-size:12px;font-weight:600;padding:4px 9px;border-radius:7px}
  .stepBtn.on{background:var(--surface2);color:var(--text)}
  .stepper{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .stepperBtn{width:58px;height:58px;border-radius:16px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .valueWrap{flex:1;text-align:center;display:flex;align-items:baseline;justify-content:center;gap:6px}
  .value{font-family:var(--display);font-size:56px;font-weight:700;font-variant-numeric:tabular-nums;line-height:1}
  .value.sm{font-size:46px}
  .unit{font-size:15px;color:var(--muted);font-weight:500}
  .prTag{display:inline-flex;align-items:center;gap:5px;background:var(--pr);color:var(--bg);font-size:12px;font-weight:700;padding:5px 11px;border-radius:20px;margin-top:12px}
  .watchBtn{width:100%;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;gap:8px;font-size:14px;font-weight:600;margin-top:14px;font-variant-numeric:tabular-nums;background:var(--surface2);color:var(--text)}
  .watchBtn.run{background:var(--danger);color:var(--bg)}
  .saveBtn{width:100%;height:58px;border-radius:16px;background:var(--accent);color:var(--bg);font-size:17px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:9px;margin-top:4px}

  .todayBox{margin-top:22px;background:var(--surface);border-radius:16px;padding:14px 14px 6px}
  .todayHead{font-family:var(--display);font-size:13px;letter-spacing:1px;color:var(--accent);font-weight:600;margin-bottom:6px}
  .setRow{display:flex;align-items:center;gap:10px;padding:10px 0;border-top:1px solid var(--line)}
  .setNo{width:24px;height:24px;border-radius:8px;background:var(--surface2);color:var(--muted);font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:var(--display)}
  .setVal{flex:1;font-size:15px}
  .setVal b{font-family:var(--display);color:var(--text);font-weight:700}
  .setVol{font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums}
  .delBtn{padding:6px;display:flex}

  .chartBox{background:var(--surface);border-radius:16px;padding:16px 12px 10px;margin-top:4px}
  .chartLabel{font-family:var(--display);font-size:12px;letter-spacing:1.2px;color:var(--muted);font-weight:500;padding:0 4px 10px}
  .dayBlock{background:var(--surface);border-radius:16px;padding:12px 14px 4px;margin-bottom:10px}
  .dayHead{display:flex;justify-content:space-between;align-items:baseline}
  .dayDate{font-family:var(--display);font-size:17px;font-weight:600}
  .dayRel{font-size:12px;color:var(--muted)}
  .empty{color:var(--muted);text-align:center;padding:50px 20px;font-size:14px}

  .navWrap{position:fixed;bottom:0;left:0;right:0;z-index:40;background:rgba(20,19,23,.92);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);border-top:1px solid var(--line)}
  .nav{max-width:460px;margin:0 auto;display:flex;padding:5px 10px calc(5px + env(safe-area-inset-bottom))}
  .navBtn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:7px 0;color:var(--muted);font-size:10.5px;font-weight:600;border-radius:12px}
  .navBtn.on{color:var(--accent)}
  .secHead{font-family:var(--display);font-size:13px;letter-spacing:1.2px;color:var(--accent);font-weight:600;margin:22px 0 10px}
  .muscleCard{background:var(--surface);border-radius:16px;padding:2px 14px}
  .muscleRow{display:flex;align-items:center;gap:11px;padding:12px 0;border-top:1px solid var(--line);width:100%;text-align:left}
  .muscleRow:first-child{border-top:none}
  .mDot{width:9px;height:9px;border-radius:9px;flex-shrink:0}
  .mName{flex:1;font-size:14.5px;font-weight:600}
  .mWhen{font-size:12.5px;color:var(--muted);font-variant-numeric:tabular-nums}
  .mTag{font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:10px;background:var(--bg);letter-spacing:.3px;flex-shrink:0}
  .volRow{display:flex;align-items:center;gap:10px;padding:7px 0}
  .volName{width:70px;font-size:12.5px;color:var(--muted);flex-shrink:0}
  .volTrack{flex:1;height:14px;background:var(--bg);border-radius:7px;overflow:hidden}
  .volFill{height:100%;background:var(--accent);border-radius:7px}
  .volVal{width:78px;text-align:right;font-size:12px;color:var(--text);font-variant-numeric:tabular-nums;flex-shrink:0}
  .tlEx{display:flex;align-items:center;gap:10px;padding:11px 0;border-top:1px solid var(--line);width:100%;text-align:left}
  .tlName{flex:1;font-size:14px;font-weight:600;line-height:1.25}
  .tlSets{font-size:12.5px;color:var(--muted);font-variant-numeric:tabular-nums;flex-shrink:0}
  .tlSets b{color:var(--text);font-weight:700}
  .chipDot{display:inline-block;width:6px;height:6px;border-radius:6px;background:var(--danger);margin-left:6px;vertical-align:1.5px}
  .moreBtn{width:100%;height:44px;border-radius:13px;background:var(--surface);border:1px solid var(--line);color:var(--muted);font-size:13.5px;font-weight:600;margin-top:2px}
  .hintSub{font-size:11.5px;color:var(--muted);margin-top:8px;padding:0 2px}

  .planCard{width:100%;background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:16px;text-align:left;margin-bottom:10px;display:flex;align-items:center;gap:12px}
  .planCard.add{border-style:dashed;background:transparent;color:var(--accent);justify-content:center;font-size:14px;font-weight:600;gap:8px}
  .planName{font-size:16px;font-weight:700}
  .planMeta{font-size:12.5px;color:var(--muted);margin-top:3px}
  .planProg{font-family:var(--display);font-size:20px;font-weight:700;color:var(--accent);margin-left:auto;flex-shrink:0;font-variant-numeric:tabular-nums}
  .planRow{display:flex;align-items:center;border-top:1px solid var(--line)}
  .planRow:first-child{border-top:none}
  .planRowBtn{flex:1;display:flex;align-items:center;gap:10px;padding:13px 0;text-align:left;min-width:0}
  .planRowName{font-size:14.5px;font-weight:600;line-height:1.25}
  .planRowMeta{font-size:12px;color:var(--muted);margin-top:2px}
  .planRowMeta b{font-family:var(--display);color:var(--text)}
  .prRow{display:flex;align-items:center;gap:10px;padding:11px 0;border-top:1px solid var(--line)}
  .prRow:first-child{border-top:none}
  .prName{flex:1;font-size:14px;font-weight:600;min-width:0}
  .prVal{font-size:13.5px;font-variant-numeric:tabular-nums;flex-shrink:0}
  .prVal b{font-family:var(--display);font-weight:700;font-size:15px}
  .prWhen{width:76px;text-align:right;font-size:11.5px;color:var(--muted);flex-shrink:0}
  .newTag{background:var(--pr);color:var(--bg);font-size:9.5px;font-weight:700;padding:2px 7px;border-radius:9px;flex-shrink:0}

  .modalWrap{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:flex-end;justify-content:center;z-index:50}
  .modal{width:100%;max-width:460px;background:var(--surface);border-radius:22px 22px 0 0;padding:20px 18px calc(30px + env(safe-area-inset-bottom))}
  .modalHead{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
  .modalTitle{font-family:var(--display);font-size:22px;font-weight:700}
  .modalInput{width:100%;background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:14px 16px;color:var(--text);font-size:16px;outline:none}
  .modeToggle{display:flex;gap:8px;margin-top:12px}
  .modeBtn{flex:1;height:44px;border-radius:12px;background:var(--bg);border:1px solid var(--line);color:var(--muted);font-size:13.5px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:6px}
  .modeBtn.on{background:var(--accent);color:var(--bg);border-color:var(--accent)}
  .bwRow{display:flex;align-items:center;gap:10px;margin-top:16px;font-size:13.5px;color:var(--muted)}
  .bwRow input{width:18px;height:18px;accent-color:var(--accent)}
  .menuItem{display:flex;align-items:center;gap:12px;width:100%;padding:15px 4px;font-size:15px;text-align:left;border-top:1px solid var(--line)}
  .menuItem:first-of-type{border-top:none}
  .menuSub{font-size:12px;color:var(--muted);margin-top:2px}

  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--surface2);color:var(--text);border-radius:22px;padding:9px 16px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px;z-index:60;border:1px solid var(--line);opacity:0;transition:opacity .2s}
  .toast.show{opacity:1}
  svg.i{display:block}
</style>
</head>
<body>
<div id="root"></div>
<div id="modal"></div>
<div id="toast" class="toast"></div>
<input type="file" id="fileIn" accept="application/json,.json" style="display:none">

<script>
/* ============ icons (inline SVG) ============ */
function ico(name,size,color){
  color=color||'currentColor';size=size||20;
  const P={
    dumbbell:'M6.5 6.5 17.5 17.5M21 21l-1-1M3 3l1 1M18 22l4-4M2 6l4-4M6 18 4 20M22 6l-4-4M18 6 6 18',
    plus:'M12 5v14M5 12h14', minus:'M5 12h14', check:'M20 6 9 17l-5-5',
    chevleft:'M15 18l-6-6 6-6', chevright:'M9 18l6-6-6-6', trend:'M22 7l-8.5 8.5-5-5L2 17M16 7h6v6',
    trash:'M3 6h18M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2',
    x:'M18 6 6 18M6 6l12 12', search:'M21 21l-4.35-4.35M11 19a8 8 0 1 0 0-16 8 8 0 0 0 0 16Z',
    history:'M3 3v5h5M3.05 13A9 9 0 1 0 6 5.3L3 8M12 7v5l4 2',
    clock:'M12 22a10 10 0 1 0 0-20 10 10 0 0 0 0 20ZM12 6v6l4 2',
    timer:'M10 2h4M12 14l3-3M12 22a8 8 0 1 0 0-16 8 8 0 0 0 0 16Z',
    play:'M6 4l14 8-14 8V4Z', square:'M5 5h14v14H5z',
    menu:'M4 6h16M4 12h16M4 18h16', download:'M12 3v12M7 10l5 5 5-5M5 21h14',
    chart:'M4 20h16M7 16v-5M12 16V6M17 16v-9',
    star:'M12 2l3.09 6.26 6.91 1.01-5 4.87 1.18 6.88L12 17.77l-6.18 3.25 1.18-6.88-5-4.87 6.91-1.01L12 2z',
    starfill:'M12 2l3.09 6.26 6.91 1.01-5 4.87 1.18 6.88L12 17.77l-6.18 3.25 1.18-6.88-5-4.87 6.91-1.01L12 2z',
    clipboard:'M9 2h6v4H9zM9 4H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2h-2',
    scale:'M12 3v3M12 21a9 9 0 1 0 0-18 9 9 0 0 0 0 18ZM12 12l3-3',
    upload:'M12 21V9M7 14l5-5 5 5M5 3h14', share:'M4 12v7a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-7M16 6l-4-4-4 4M12 2v13',
    pencil:'M12 20h9M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z',
    run:'M22 12h-4l-3 9L9 3l-3 9H2'
  };
  const fill = name==='play'||name==='square'||name==='starfill' ? color : 'none';
  return `<svg class="i" width="${size}" height="${size}" viewBox="0 0 24 24" fill="${fill}" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">`+
    P[name].split('M').filter(Boolean).map(d=>`<path d="M${d}"/>`).join('')+`</svg>`;
}

/* ============ data ============ */
var DEFAULTS=[
 ['bank','Bankdrücken','Brust',false,'reps'],['schraeg','Schrägbankdrücken','Brust',false,'reps'],
 ['butterfly','Butterfly','Brust',false,'reps'],['dips','Dips','Brust',true,'reps'],
 ['klimm','Klimmzüge','Rücken',true,'reps'],['latzug','Latzug','Rücken',false,'reps'],
 ['rudern','Langhantelrudern','Rücken',false,'reps'],['kreuz','Kreuzheben','Rücken',false,'reps'],
 ['deadhang','Dead Hang','Rücken',true,'time'],
 ['kniebeuge','Kniebeugen','Beine',false,'reps'],['beinpresse','Beinpresse','Beine',false,'reps'],
 ['beinstrecker','Beinstrecker','Beine',false,'reps'],['beinbeuger','Beinbeuger','Beine',false,'reps'],
 ['waden','Wadenheben','Beine',false,'reps'],['wallsit','Wall Sit','Beine',true,'time'],
 ['schulter','Schulterdrücken','Schulter',false,'reps'],['seitheben','Seitheben','Schulter',false,'reps'],
 ['bizeps','Bizeps-Curls','Arme',false,'reps'],['trizeps','Trizeps-Drücken','Arme',false,'reps'],
 ['crunches','Crunches','Bauch',true,'reps'],['plank','Plank','Bauch',true,'time'],
 ['seitstuetz','Seitstütz','Bauch',true,'time'],
 ['laufband','Laufband','Cardio',true,'cardio']
].map(function(a){return {id:a[0],name:a[1],group:a[2],bw:a[3],mode:a[4]};});

function defaultPlans(){
  return [
    {id:'plan-push',name:'Push',exIds:['bank','schraeg','butterfly','dips','schulter','seitheben','trizeps']},
    {id:'plan-pull',name:'Pull',exIds:['klimm','latzug','rudern','kreuz','bizeps']},
    {id:'plan-beine',name:'Beine',exIds:['kniebeuge','beinpresse','beinstrecker','beinbeuger','waden']}
  ];
}
var KEY='gymlog-v1';
var data={exercises:DEFAULTS.slice(),sets:[],plans:defaultPlans(),body:[]};
function load(){try{var r=localStorage.getItem(KEY);if(r){var p=JSON.parse(r);data={
  exercises:(p.exercises&&p.exercises.length)?p.exercises:DEFAULTS.slice(),
  sets:p.sets||[],
  plans:(p.plans&&p.plans.length)?p.plans:defaultPlans(),
  body:p.body||[]};}}catch(e){}migrate();}
function migrate(){
  if(!data.exercises.some(function(e){return e.id==='laufband'||e.mode==='cardio';}))
    data.exercises.push({id:'laufband',name:'Laufband',group:'Cardio',bw:true,mode:'cardio'});
}
function save(){try{localStorage.setItem(KEY,JSON.stringify(data));}catch(e){}}

/* ============ helpers ============ */
function esc(s){return String(s).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
function dayKey(d){d=new Date(d);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
var WD=['So.','Mo.','Di.','Mi.','Do.','Fr.','Sa.'],MO=['Jan.','Feb.','März','Apr.','Mai','Juni','Juli','Aug.','Sep.','Okt.','Nov.','Dez.'];
function fmtFull(d){d=new Date(d);return WD[d.getDay()]+' '+d.getDate()+'. '+MO[d.getMonth()]+' '+d.getFullYear();}
function fmtShort(k){var a=k.split('-').map(Number),d=new Date(a[0],a[1]-1,a[2]);return WD[d.getDay()]+' '+d.getDate()+'. '+MO[d.getMonth()];}
function relDays(k){var t=dayKey(new Date());if(k===t)return'heute';var a=k.split('-').map(Number),then=new Date(a[0],a[1]-1,a[2]),now=new Date();now.setHours(0,0,0,0);var diff=Math.round((now-then)/864e5);if(diff===1)return'gestern';if(diff<7)return'vor '+diff+' Tagen';if(diff<14)return'vor 1 Woche';if(diff<31)return'vor '+Math.round(diff/7)+' Wochen';return'vor '+Math.round(diff/30)+' Mon.';}
function fmtTime(s){s=Math.max(0,Math.round(s));return s<60?s+' Sek.':Math.floor(s/60)+':'+String(s%60).padStart(2,'0')+' Min.';}
function fmtTimeShort(s){s=Math.max(0,Math.round(s));return s<60?s+' s':Math.floor(s/60)+':'+String(s%60).padStart(2,'0');}
function isTime(x){return x&&x.mode==='time';}
function isCardio(x){return x&&x.mode==='cardio';}
function setVol(s){return (isTime(s)||isCardio(s))?0:(s.weight*s.reps||0);}
function nf(n){return Number(n).toLocaleString('de-DE');}
function nf1(n){return Number(n).toLocaleString('de-DE',{minimumFractionDigits:1,maximumFractionDigits:1});}
function fmtPace(sec,km){if(!km||!sec)return'';var t=Math.round(sec/km);return Math.floor(t/60)+':'+String(t%60).padStart(2,'0')+' /km';}
/* Körpergewicht für kcal-Schätzung: letzter Eintrag, sonst 75 kg */
function latestBw(){if(!data.body.length)return null;return data.body.slice().sort(function(a,b){return a.date<b.date?1:-1;})[0].kg;}
function kcalForDay(k){
  var kg=latestBw()||75,kcal=0;
  var sets=data.sets.filter(function(s){return s.date===k;});
  var str=sets.filter(function(s){return !isCardio(s);});
  if(str.length){
    var ts=str.map(function(s){return s.ts;});
    var mins=Math.max((Math.max.apply(null,ts)-Math.min.apply(null,ts))/60000,str.length*2);
    kcal+=5*kg*(mins/60); /* ~5 MET Krafttraining */
  }
  sets.filter(isCardio).forEach(function(s){
    if(s.km>0)kcal+=kg*s.km*1.0; else if(s.seconds>0)kcal+=8*kg*(s.seconds/3600);
  });
  return Math.round(kcal);
}

        draft:null, modal:null, tlAll:false, watch:{running:false,elapsed:0,int:null,start:0}};
var GROUPS=['Alle','Brust','Rücken','Beine','Schulter','Arme','Bauch','Cardio'];

function ex(id){return data.exercises.find(function(e){return e.id===id;});}
function setsFor(id){return data.sets.filter(function(s){return s.exerciseId===id;});}

/* ============ mutations ============ */
function addSet(id,p){
  var s={id:Date.now()+'-'+Math.random().toString(36).slice(2,6),exerciseId:id,date:dayKey(new Date()),ts:Date.now(),weight:Number(p.weight)||0,mode:p.mode==='time'?'time':(p.mode==='cardio'?'cardio':'reps')};
  if(p.mode==='time')s.seconds=Number(p.seconds)||0;
  else if(p.mode==='cardio'){s.km=Math.round((Number(p.km)||0)*10)/10;s.seconds=Number(p.seconds)||0;s.weight=0;}
  else s.reps=Number(p.reps)||0;
  data.sets.push(s);save();toast('Gespeichert');if(navigator.vibrate)navigator.vibrate(15);
}
function delSet(id){data.sets=data.sets.filter(function(s){return s.id!==id;});save();}
function addExercise(name,group,bw,mode){data.exercises.push({id:'ex-'+Date.now(),name:name,group:group,bw:bw,mode:mode});save();}
function updateExercise(id,props){var e=ex(id);if(!e)return;e.name=props.name;e.group=props.group;e.bw=props.bw;e.mode=props.mode;save();}
/* Soft-Delete: Übung verschwindet aus App + Plänen, Sätze bleiben in Daten + Export */
function archiveExercise(id){var e=ex(id);if(!e)return;e.archived=true;
  data.plans.forEach(function(p){p.exIds=p.exIds.filter(function(x){return x!==id;});});save();}

var toastT;
function toast(msg){var t=document.getElementById('toast');t.innerHTML=ico('check',15,'#5FD08A')+' '+esc(msg);t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(function(){t.classList.remove('show');},1300);}

   </div>
   <div class="statRow">

     <div class="stat"><div class="statN">${exCount}</div><div class="statL">${exCount===1?'Übung':'Übungen'}</div></div>
     <div class="stat"><div class="statN">${nf(vol)}</div><div class="statL">kg Volumen</div></div>

   </div>
   ${(kcalToday>0&&!data.body.length)?'<div class="hintSub" style="margin:-10px 2px 14px">kcal-Schätzung nutzt 75 kg – trag dein Gewicht im Fortschritt-Tab ein, dann wird sie genauer.</div>':''}
   <div class="searchWrap">${ico('search',17,'#8C8895')}

   </div>
   <div class="chips">${GROUPS.map(function(g,i){
     var chip=`<button class="chip tap${ui.filter===g?' on':''}" data-a="filter" data-v="${g}">${g}${stale[g]?'<span class="chipDot"></span>':''}</button>`;

   <div class="grid">

         <div class="exName" style="${(isTime(e)||isCardio(e))?'padding-left:20px':''}">${e.fav?'<span style="color:var(--accent);font-size:11px">★</span> ':''}${esc(e.name)}</div>

/* ---- Progress (Verlauf & Muskel-Check) ---- */
function exById(){var m={};data.exercises.forEach(function(e){m[e.id]=e;});return m;}
function daysSinceKey(k){var a=k.split('-').map(Number);var then=new Date(a[0],a[1]-1,a[2]);var now=new Date();now.setHours(0,0,0,0);return Math.round((now-then)/864e5);}
function groupStatus(){
  var by=exById(),last={};
  data.sets.forEach(function(s){var e=by[s.exerciseId];if(!e)return;if(!last[e.group]||s.date>last[e.group])last[e.group]=s.date;});
  return GROUPS.slice(1).map(function(g){
    var k=last[g]||null,d=(k!==null&&k!==undefined&&k)?daysSinceKey(k):null;
    var st=k?(d<=3?'fresh':(d<=6?'mid':'stale')):'never';
    return {group:g,key:k,days:d,st:st};
  });
}
function weekStartKey(d){d=new Date(d);d.setHours(0,0,0,0);var wd=(d.getDay()+6)%7;d.setDate(d.getDate()-wd);return dayKey(d);}
function weekStreak(){
  var wk={};data.sets.forEach(function(s){var a=s.date.split('-').map(Number);wk[weekStartKey(new Date(a[0],a[1]-1,a[2]))]=1;});
  var cur=new Date(),n=0;
  if(!wk[weekStartKey(cur)])cur.setDate(cur.getDate()-7); /* laufende Woche zählt noch nicht gegen die Serie */
  while(wk[weekStartKey(cur)]){n++;cur.setDate(cur.getDate()-7);}
  return n;
}
function barPath(x,y,w,h,r,col){
  r=Math.min(r,h,w/2);
  return '<path d="M'+x.toFixed(1)+' '+(y+h).toFixed(1)+' V'+(y+r).toFixed(1)+' Q'+x.toFixed(1)+' '+y.toFixed(1)+' '+(x+r).toFixed(1)+' '+y.toFixed(1)+
    ' H'+(x+w-r).toFixed(1)+' Q'+(x+w).toFixed(1)+' '+y.toFixed(1)+' '+(x+w).toFixed(1)+' '+(y+r).toFixed(1)+' V'+(y+h).toFixed(1)+' Z" fill="'+col+'"/>';
}
function navBar(active){
  return `<div style="height:76px"></div><div class="navWrap"><div class="nav">
    <button class="navBtn tap${active==='home'?' on':''}" data-a="tab" data-v="home">${ico('dumbbell',20)}<span>Training</span></button>
    <button class="navBtn tap${active==='plans'?' on':''}" data-a="tab" data-v="plans">${ico('clipboard',20)}<span>Pläne</span></button>
    <button class="navBtn tap${active==='progress'?' on':''}" data-a="tab" data-v="progress">${ico('chart',20)}<span>Fortschritt</span></button>
  </div></div>`;
}

/* ---- Trainingspläne ---- */
function plan(id){return data.plans.find(function(p){return p.id===id;});}
function planDoneCount(p,today){
  return p.exIds.filter(function(eid){return data.sets.some(function(s){return s.exerciseId===eid&&s.date===today;});}).length;
}
function viewPlans(){
  var today=dayKey(new Date());

      <div class="planProg">${done?done+'/'+p.exIds.length:''}</div>
      ${ico('chevright',18,'#8C8895')}
    </button>`;
  }).join('');

     <div><div class="eyebrow">TRAININGSPLÄNE</div><div class="dateBig">Deine Routinen</div></div>
     <div class="top-icons"><button class="icon-btn tap" data-a="menu">${ico('menu',22,'#8C8895')}</button>${ico('clipboard',24,'#F5C518')}</div>

   ${cards}
   <button class="planCard add tap" data-a="plannew">${ico('plus',18,'#F5C518')} Neuen Plan anlegen</button>
   ${navBar('plans')}`;
}
function viewPlan(){
  var p=plan(ui.activePlanId);if(!p)return viewPlans();
  var today=dayKey(new Date());
  var lastBy={};data.sets.forEach(function(s){if(!lastBy[s.exerciseId]||s.ts>lastBy[s.exerciseId].ts)lastBy[s.exerciseId]=s;});
  var done=planDoneCount(p,today);
  var rows=p.exIds.map(function(eid){
    var e=ex(eid);if(!e||e.archived)return'';
    var l=lastBy[eid],doneToday=data.sets.some(function(s){return s.exerciseId===eid&&s.date===today;});
    var last=l?(isCardio(l)?'<b>'+nf1(l.km||0)+' km</b>':(isTime(l)?'<b>'+fmtTimeShort(l.seconds)+'</b>':(l.weight>0?'<b>'+l.weight+'</b> kg × '+l.reps:'<b>'+l.reps+'</b> Wdh.'))):'neu';
    return `<div class="planRow">
      <button class="planRowBtn tap" data-a="open" data-id="${eid}">
        ${doneToday?'<span class="planRowDot"></span>':'<span class="planRowDot" style="background:var(--line)"></span>'}
        <div><div class="planRowName">${e.fav?'<span style="color:var(--accent);font-size:10px">★</span> ':''}${esc(e.name)}</div>
        <div class="planRowMeta">${esc(e.group)} · ${last}</div></div>
      </button>
      <button class="delBtn tap" data-a="planremex" data-id="${eid}">${ico('x',16,'#8C8895')}</button>
    </div>`;
  }).join('');
  return `<div class="logHeader">
     <button class="icon-btn tap" data-a="planback">${ico('chevleft',24)}</button>
     <div style="display:flex;gap:2px">
       <button class="icon-btn tap" data-a="planedit">${ico('pencil',19,'#8C8895')}</button>
       <button class="icon-btn tap" data-a="plandel">${ico('trash',19,'#8C8895')}</button>
     </div>
   </div>
   <div class="logTitleWrap">
     <div class="eyebrow">PLAN${done===p.exIds.length&&p.exIds.length?' · KOMPLETT ✓':done?' · '+done+'/'+p.exIds.length+' HEUTE':''}</div>
     <h1 class="logTitle">${esc(p.name)}</h1>
   </div>
   <div class="muscleCard" style="padding:2px 16px">${rows||'<div class="empty" style="padding:24px">Noch keine Übungen im Plan.</div>'}</div>
   <button class="moreBtn tap" data-a="planaddex" style="margin-top:12px;color:var(--accent);border-color:var(--accent)">+ Übung hinzufügen</button>
   ${navBar('plans')}`;
}
function viewProgress(){
  var by=exById();
  var header=`<div class="header">
     <div><div class="eyebrow">FORTSCHRITT</div><div class="dateBig">Verlauf & Muskeln</div></div>
     <div class="top-icons"><button class="icon-btn tap" data-a="menu">${ico('menu',22,'#8C8895')}</button>${ico('trend',24,'#F5C518')}</div>
   </div>`;
  if(!data.sets.length)return header+'<div class="empty">Noch keine Daten.<br>Logge deinen ersten Satz – hier entsteht dann dein Verlauf.</div>'+navBar('progress');

  /* Kopf-Statistiken */
  var days30={},sets30=0;
  data.sets.forEach(function(s){if(daysSinceKey(s.date)<30){days30[s.date]=1;sets30++;}});
  var stats=`<div class="statRow">
     <div class="stat"><div class="statN">${weekStreak()}</div><div class="statL">Wochen-Serie</div></div>
     <div class="stat"><div class="statN">${Object.keys(days30).length}</div><div class="statL">Tage (30 T.)</div></div>
     <div class="stat"><div class="statN">${sets30}</div><div class="statL">Sätze (30 T.)</div></div>
   </div>`;

  /* Muskel-Check: welche Gruppe wie lange nicht trainiert */
  var gs=groupStatus();
  var trained=gs.filter(function(x){return x.key;}).sort(function(a,b){return b.days-a.days;});
  var never=gs.filter(function(x){return !x.key;});
  var COL={fresh:'var(--pr)',mid:'var(--accent)',stale:'var(--danger)',never:'var(--line)'};
  var TCOL={fresh:'var(--pr)',mid:'var(--accent)',stale:'var(--danger)',never:'var(--muted)'};
  var TXT={fresh:'frisch',mid:'ok',stale:'überfällig',never:'noch nie'};
  var muscle='<div class="secHead">MUSKEL-CHECK · ZULETZT TRAINIERT</div><div class="muscleCard">'+
    trained.concat(never).map(function(x){
      return `<button class="muscleRow tap" data-a="musclego" data-v="${x.group}">
        <span class="mDot" style="background:${COL[x.st]}"></span>
        <span class="mName">${x.group}</span>
        <span class="mWhen">${x.key?relDays(x.key):'–'}</span>
        <span class="mTag" style="color:${TCOL[x.st]}">${TXT[x.st]}</span>
      </button>`;}).join('')+'</div><div class="hintSub">Tippen filtert die Übungsliste auf die Gruppe.</div>';

  /* Trainingstage pro Woche (letzte 8 Wochen) */
  var wkDays={};
  data.sets.forEach(function(s){var a=s.date.split('-').map(Number);var wkey=weekStartKey(new Date(a[0],a[1]-1,a[2]));(wkDays[wkey]=wkDays[wkey]||{})[s.date]=1;});
  var weeks=[];
  for(var i=7;i>=0;i--){var d=new Date();d.setDate(d.getDate()-7*i);var k=weekStartKey(d);weeks.push({key:k,n:wkDays[k]?Object.keys(wkDays[k]).length:0});}
  var W=420,H=132,pad=26,innerW=W-2*pad,slot=innerW/8,bw=slot*0.55;
  var ymax=Math.max(4,Math.max.apply(null,weeks.map(function(w){return w.n;})));
  var bars=weeks.map(function(w,i){
    var cx=pad+slot*(i+0.5);
    if(!w.n)return '';
    var h=w.n/ymax*(H-2*pad),y=H-pad-h;
    var col=i===7?'#F5C518':'rgba(245,197,24,.45)';
    return barPath(cx-bw/2,y,bw,h,3,col)+
      '<text x="'+cx.toFixed(1)+'" y="'+(y-5).toFixed(1)+'" fill="#8C8895" font-size="9.5" font-family="Inter" text-anchor="middle">'+w.n+'</text>';
  }).join('');
  function wlab(k){var a=k.split('-').map(Number);return a[2]+'.'+a[1]+'.';}
  var axis='<line x1="'+pad+'" y1="'+(H-pad)+'" x2="'+(W-pad)+'" y2="'+(H-pad)+'" stroke="#38353F"/>'+
    '<text x="'+(pad+slot*0.5)+'" y="'+(H-8)+'" fill="#8C8895" font-size="9" font-family="Inter" text-anchor="middle">'+wlab(weeks[0].key)+'</text>'+
    '<text x="'+(pad+slot*7.5)+'" y="'+(H-8)+'" fill="#8C8895" font-size="9" font-family="Inter" text-anchor="middle">diese Wo.</text>';
  var weekly='<div class="secHead">AKTIVITÄT</div><div class="chartBox"><div class="chartLabel">TRAININGSTAGE PRO WOCHE</div>'+
    '<svg viewBox="0 0 '+W+' '+H+'" width="100%" style="display:block">'+axis+bars+'</svg></div>';

  /* Volumen pro Muskelgruppe (30 Tage) */
  var vol={},tot=0;
  data.sets.forEach(function(s){if(daysSinceKey(s.date)<30){var e=by[s.exerciseId];if(!e)return;var v=setVol(s);vol[e.group]=(vol[e.group]||0)+v;tot+=v;}});
  var vrows=GROUPS.slice(1).filter(function(g){return g!=='Cardio';}).map(function(g){return{g:g,v:vol[g]||0};}).sort(function(a,b){return b.v-a.v;});
  var vmax=Math.max.apply(null,vrows.map(function(r){return r.v;}))||1;
  var volume='<div class="secHead">VOLUMEN · LETZTE 30 TAGE</div><div class="chartBox" style="padding:14px">'+
    (tot?vrows.map(function(r){
      return `<div class="volRow"><span class="volName">${r.g}</span><div class="volTrack"><div class="volFill" style="width:${r.v?Math.max(2,Math.round(r.v/vmax*100)):0}%"></div></div><span class="volVal">${nf(r.v)} kg</span></div>`;
    }).join('')+'<div class="hintSub" style="padding:4px 0 0">Volumen = Gewicht × Wiederholungen. Zeit- und Cardio-Übungen zählen hier nicht.</div>'
    :'<div class="empty" style="padding:14px">Noch kein Volumen in den letzten 30 Tagen.</div>')+'</div>';

  /* Timeline: wann, was, wie viel */
  var byDayAll={};
  data.sets.forEach(function(s){(byDayAll[s.date]=byDayAll[s.date]||[]).push(s);});
  var dayKeys=Object.keys(byDayAll).sort().reverse();
  var shown=ui.tlAll?dayKeys:dayKeys.slice(0,10);
  var tl=shown.map(function(k){
    var arr=byDayAll[k];
    var byEx={};arr.forEach(function(s){(byEx[s.exerciseId]=byEx[s.exerciseId]||[]).push(s);});
    var dvol=arr.reduce(function(a,s){return a+setVol(s);},0);
    var rows=Object.keys(byEx).map(function(eid){
      var e=by[eid]||{name:'Gelöschte Übung',group:'',mode:'reps'};
      var ss=byEx[eid],top;
      if(isCardio(e)||ss.some(isCardio)){var km=ss.reduce(function(a,s){return a+(s.km||0);},0);top='<b>'+nf1(km)+'</b> km';}
      else if(isTime(e)){var mx=Math.max.apply(null,ss.map(function(s){return s.seconds||0;}));top='<b>'+fmtTimeShort(mx)+'</b>';}
      else{var bs=ss.slice().sort(function(a,b){return (b.weight-a.weight)||((b.reps||0)-(a.reps||0));})[0];
        top=bs.weight>0?'<b>'+bs.weight+'</b> kg × '+(bs.reps||0):'<b>'+(bs.reps||0)+'</b> Wdh.';}
      return `<button class="tlEx tap" data-a="open" data-id="${eid}">
        <span class="tlName">${esc(e.name)}${e.archived?' <span style="color:var(--muted);font-weight:400">· gelöscht</span>':''}</span><span class="tlSets">${ss.length}× · Top ${top}</span></button>`;
    }).join('');
    var kc=kcalForDay(k);
    return '<div class="dayBlock"><div class="dayHead"><span class="dayDate">'+fmtShort(k)+'</span><span class="dayRel">'+(dvol?nf(dvol)+' kg · ':'')+(kc?'≈ '+nf(kc)+' kcal · ':'')+relDays(k)+'</span></div>'+rows+'</div>';
  }).join('');
  var more=(!ui.tlAll&&dayKeys.length>10)?'<button class="moreBtn tap" data-a="tlmore">Alle '+dayKeys.length+' Trainingstage anzeigen</button>':'';
  var timeline='<div class="secHead">TIMELINE · WAS WANN</div>'+tl+more;

  return header+stats+muscle+weekly+volume+prSection(by)+bodySection()+timeline+navBar('progress');
}

/* ---- Rekorde (PR-Liste) ---- */
function prSection(by){
  var best={};
  data.sets.forEach(function(s){
    var e=by[s.exerciseId];if(!e)return;
    var b=best[s.exerciseId];
    if(isCardio(s)){var kk=s.km||0;if(kk>0&&(!b||b.kind!=='km'||kk>b.v))best[s.exerciseId]={kind:'km',v:kk,ts:s.ts,date:s.date};}
    else if(isTime(e)){var v=s.seconds||0;if(v>0&&(!b||v>b.v))best[s.exerciseId]={kind:'time',v:v,ts:s.ts,date:s.date};}
    else if((s.weight||0)>0){var w=s.weight,r=s.reps||0;
      if(!b||b.kind==='reps'||w>b.v||(w===b.v&&r>b.r))best[s.exerciseId]={kind:'kg',v:w,r:r,ts:s.ts,date:s.date};}
    else{var rr=s.reps||0;if(rr>0&&(!b||(b.kind==='reps'&&rr>b.v)))best[s.exerciseId]=b&&b.kind!=='reps'?b:{kind:'reps',v:rr,ts:s.ts,date:s.date};}
  });
  var rows=Object.keys(best).map(function(eid){var e=by[eid];return {e:e,b:best[eid]};})
    .filter(function(x){return x.e&&!x.e.archived;})
    .sort(function(a,b){return b.b.ts-a.b.ts;});
  if(!rows.length)return'';
  var shown=ui.prAll?rows:rows.slice(0,8);
  var html=shown.map(function(x){
    var b=x.b,val=b.kind==='time'?'<b>'+fmtTimeShort(b.v)+'</b>':(b.kind==='km'?'<b>'+nf1(b.v)+'</b> km':(b.kind==='kg'?'<b>'+b.v+'</b> kg × '+b.r:'<b>'+b.v+'</b> Wdh.'));
    var isNew=daysSinceKey(b.date)<=7;
    return `<div class="prRow"><span class="prName">${esc(x.e.name)}</span>${isNew?'<span class="newTag">NEU</span>':''}<span class="prVal">${val}</span><span class="prWhen">${relDays(b.date)}</span></div>`;
  }).join('');
  var more=(!ui.prAll&&rows.length>8)?'<button class="moreBtn tap" data-a="prmore" style="margin-top:10px">Alle '+rows.length+' Rekorde anzeigen</button>':'';
  return '<div class="secHead">REKORDE · BESTWERTE</div><div class="muscleCard" style="padding:2px 14px">'+html+'</div>'+more;
}

/* ---- Körpergewicht ---- */
function bodySection(){
  var bw=data.body.slice().sort(function(a,b){return a.date<b.date?-1:1;});
  var head='<div class="secHead">KÖRPERGEWICHT</div>';
  var addBtn='<button class="moreBtn tap" data-a="bwadd" style="margin-top:10px;color:var(--accent);border-color:var(--accent)">+ Gewicht eintragen</button>';
  if(!bw.length)return head+'<div class="chartBox" style="padding:14px"><div class="empty" style="padding:12px">Noch kein Eintrag.</div></div>'+addBtn;
  var latest=bw[bw.length-1],first=bw[0];
  var delta=Math.round((latest.kg-first.kg)*10)/10;
  var deltaTxt=bw.length>1?(delta>0?'+':'')+nf(delta)+' kg seit '+fmtShort(first.date):'erster Eintrag';
  var chart='';
  if(bw.length>1){
    var W=420,H=120,pad=26,n=bw.length;
    var max=Math.max.apply(null,bw.map(function(b){return b.kg;}));
    var min=Math.min.apply(null,bw.map(function(b){return b.kg;}));
    var span=(max-min)||1;
    var pts=bw.map(function(b,i){return {x:pad+(n===1?0:i*(W-2*pad)/(n-1)),y:H-pad-((b.kg-min)/span)*(H-2*pad)};});
    var line=pts.map(function(pt,i){return (i?'L':'M')+pt.x.toFixed(1)+' '+pt.y.toFixed(1);}).join(' ');
    var dots=pts.map(function(pt){return '<circle cx="'+pt.x.toFixed(1)+'" cy="'+pt.y.toFixed(1)+'" r="3" fill="#F5C518"/>';}).join('');
    var grid=[0,.5,1].map(function(f){var y=pad+f*(H-2*pad);return '<line x1="'+pad+'" y1="'+y+'" x2="'+(W-pad)+'" y2="'+y+'" stroke="#38353F" stroke-dasharray="2 4"/>';}).join('');
    var labs='<text x="'+(pad-4)+'" y="'+(pad+3)+'" fill="#8C8895" font-size="9" font-family="Inter" text-anchor="end">'+nf(max)+'</text>'+
      '<text x="'+(pad-4)+'" y="'+(H-pad+3)+'" fill="#8C8895" font-size="9" font-family="Inter" text-anchor="end">'+nf(min)+'</text>'+
      '<text x="'+pad+'" y="'+(H-6)+'" fill="#8C8895" font-size="9" font-family="Inter">'+esc(fmtShort(first.date))+'</text>'+
      '<text x="'+(W-pad)+'" y="'+(H-6)+'" fill="#8C8895" font-size="9" font-family="Inter" text-anchor="end">'+esc(fmtShort(latest.date))+'</text>';
    chart='<svg viewBox="0 0 '+W+' '+H+'" width="100%" style="display:block;margin-top:10px">'+grid+'<path d="'+line+'" fill="none" stroke="#F5C518" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>'+dots+labs+'</svg>';
  }
  return head+'<div class="chartBox" style="padding:14px">'+
    '<div style="display:flex;align-items:baseline;gap:10px"><span style="font-family:var(--display);font-size:30px;font-weight:700">'+nf(latest.kg)+'</span><span class="unit">kg</span>'+
    '<span style="font-size:12px;color:var(--muted);margin-left:auto">'+deltaTxt+'</span></div>'+chart+'</div>'+addBtn;
}

/* ---- Logger ---- */
function ensureDraft(e){
  var last=setsFor(e.id).sort(function(a,b){return b.ts-a.ts;})[0];
  var timed=isTime(e),cardio=isCardio(e);
  if(!ui.draft||ui.draft.exId!==e.id){
    ui.draft={exId:e.id,
      weight:last?last.weight:(e.bw?0:20),
      reps:(last&&!timed&&!cardio)?last.reps:(timed?8:10),
      seconds:cardio?((last&&last.seconds)?last.seconds:1800):((last&&timed)?last.seconds:30),
      km:cardio?((last&&last.km)?last.km:3):0,
      step:2.5,tStep:cardio?60:5,kStep:0.5};
  }
  return ui.draft;
}
function viewLog(){
  var e=ex(ui.activeId);if(!e)return'';
  var timed=isTime(e),cardio=isCardio(e),d=ensureDraft(e),today=dayKey(new Date());
  var all=setsFor(e.id);
  var todaySets=all.filter(function(s){return s.date===today;}).sort(function(a,b){return a.ts-b.ts;});
  var bestW=all.reduce(function(m,s){return Math.max(m,s.weight||0);},0);
  var bestT=all.reduce(function(m,s){return Math.max(m,s.seconds||0);},0);
  var bestK=all.reduce(function(m,s){return Math.max(m,s.km||0);},0);
  var isPR=cardio?(d.km>bestK&&d.km>0):(timed?(d.seconds>bestT&&d.seconds>0):(d.weight>bestW&&d.weight>0));
  // prev session
  var byDay={};all.forEach(function(s){(byDay[s.date]=byDay[s.date]||[]).push(s);});
  var days=Object.keys(byDay).filter(function(k){return k!==today;}).sort().reverse();
  var prev=days.length?{key:days[0],sets:byDay[days[0]].sort(function(a,b){return a.ts-b.ts;})}:null;
  var bigTime=d.seconds<60?(''+d.seconds):(Math.floor(d.seconds/60)+':'+String(d.seconds%60).padStart(2,'0'));
  var timeUnit=d.seconds<60?'Sek.':'Min.';
  var w=ui.watch;

  function refLine(){
    if(!prev)return '<div class="lastRef"><span>Erstes Training mit dieser Übung.</span></div>';
    var parts=prev.sets.map(function(s){
      if(isCardio(s))return '<b>'+nf1(s.km||0)+' km'+(s.seconds?' · '+fmtTimeShort(s.seconds):'')+'</b>';
      return isTime(s)?((s.weight>0?'<b>'+s.weight+'kg·</b>':'')+'<b>'+fmtTimeShort(s.seconds)+'</b>'):('<b>'+s.weight+'</b>×'+s.reps);
    }).join(', ');
    return '<div class="lastRef">'+ico('clock',13,'#8C8895')+'<span>Letztes Mal ('+relDays(prev.key)+'): '+parts+'</span></div>';
  }
  function setRow(s,i){
    var val,vol;
    if(isCardio(s)){
      val='<b>'+nf1(s.km||0)+'</b> km'+(s.seconds?' · '+fmtTimeShort(s.seconds):'');
      vol='<span class="setVol">'+(fmtPace(s.seconds,s.km)||'≈ '+Math.round((latestBw()||75)*(s.km||0))+' kcal')+'</span>';
    }else if(isTime(s)){
      val=(s.weight>0?'<b>'+s.weight+'</b> kg · ':'')+'<b>'+fmtTimeShort(s.seconds)+'</b>';vol='';
    }else{
      val=s.weight>0?'<b>'+s.weight+'</b> kg × '+s.reps:'<b>'+s.reps+'</b> Wdh.';
      vol='<span class="setVol">'+nf(s.weight*s.reps)+' kg</span>';
    }
    return '<div class="setRow"><span class="setNo">'+(i+1)+'</span><span class="setVal">'+val+'</span>'+vol+
      '<button class="delBtn tap" data-a="delset" data-id="'+s.id+'">'+ico('trash',16,'#8C8895')+'</button></div>';
  }
  var timeControl=function(prTag,steps,lab){return `
    <div class="control">
      <div class="controlLabel"><span>ZEIT</span>
        <div class="stepToggle">${steps.map(function(v){return `<button class="stepBtn tap${d.tStep===v?' on':''}" data-a="tstep" data-v="${v}">${lab(v)}</button>`;}).join('')}</div>
      </div>
      <div class="stepper">
        <button class="stepperBtn tap" data-a="tminus">${ico('minus',28)}</button>
        <div class="valueWrap"><span class="value ${d.seconds>=60?'sm':''}" style="color:${(prTag&&isPR)?'var(--pr)':'var(--text)'}">${bigTime}</span><span class="unit">${timeUnit}</span></div>
        <button class="stepperBtn tap" data-a="tplus">${ico('plus',28)}</button>
      </div>
      ${(prTag&&isPR)?`<div class="prTag">${ico('trend',13,'#141317')} Neue Bestzeit!</div>`:''}
      <button class="watchBtn tap ${w.running?'run':''}" data-a="watch">
        ${w.running?ico('square',16,'#141317')+' Stoppen · '+fmtTimeShort(w.elapsed):ico('play',16,'#F5C518')+' Stoppuhr'}
      </button>
    </div>`;};
  var second = cardio?
    timeControl(false,[60,300,600],function(v){return (v/60)+'m';})+
    `<div class="lastRef" style="margin:2px 4px 14px">${ico('trend',13,'#8C8895')}<span>≈ <b>${nf(Math.round((latestBw()||75)*(d.km||0)))} kcal</b>${fmtPace(d.seconds,d.km)?' · Pace <b>'+fmtPace(d.seconds,d.km)+'</b>':''}</span></div>`
   :(timed?timeControl(true,[5,10,30],function(v){return v+'s';}):`
    <div class="control">
      <div class="controlLabel"><span>WIEDERHOLUNGEN</span></div>
      <div class="stepper">
        <button class="stepperBtn tap" data-a="rminus">${ico('minus',28)}</button>
        <div class="valueWrap"><span class="value">${d.reps}</span><span class="unit">Wdh.</span></div>
        <button class="stepperBtn tap" data-a="rplus">${ico('plus',28)}</button>
      </div>
    </div>`);

  return `
   <div class="logHeader">
     <button class="icon-btn tap" data-a="back">${ico('chevleft',24)}</button>
     <div style="display:flex;gap:2px">
       <button class="icon-btn tap" data-a="exedit">${ico('pencil',19,'#8C8895')}</button>
       <button class="icon-btn tap" data-a="favtoggle">${e.fav?ico('starfill',21,'#F5C518'):ico('star',21,'#8C8895')}</button>
       <button class="icon-btn tap" data-a="gohist">${ico('history',21,'#8C8895')}</button>
     </div>
   </div>
   <div class="logTitleWrap">
     <div class="eyebrow">${esc(e.group.toUpperCase())}${timed?' · ZEIT':''}${cardio?' · DISTANZ + ZEIT':''}</div>
     <h1 class="logTitle">${esc(e.name)}</h1>
     ${refLine()}
   </div>
   ${cardio?`
   <div class="control">
     <div class="controlLabel"><span>DISTANZ</span>
       <div class="stepToggle">${[0.1,0.5,1].map(function(v){return `<button class="stepBtn tap${d.kStep===v?' on':''}" data-a="kstep" data-v="${v}">${String(v).replace('.',',')}</button>`;}).join('')}</div>
     </div>
     <div class="stepper">
       <button class="stepperBtn tap" data-a="kminus">${ico('minus',28)}</button>
       <div class="valueWrap"><span class="value" style="color:${isPR?'var(--pr)':'var(--accent)'}">${nf1(d.km)}</span><span class="unit">km</span></div>
       <button class="stepperBtn tap" data-a="kplus">${ico('plus',28)}</button>
     </div>
     ${isPR?`<div class="prTag">${ico('trend',13,'#141317')} Neuer Distanz-Rekord!</div>`:''}
   </div>`:`
   <div class="control">
     <div class="controlLabel"><span>GEWICHT${timed?' (optional)':''}</span>
       <div class="stepToggle">${[1,2.5,5].map(function(v){return `<button class="stepBtn tap${d.step===v?' on':''}" data-a="wstep" data-v="${v}">${v}</button>`;}).join('')}</div>
     </div>
     <div class="stepper">
       <button class="stepperBtn tap" data-a="wminus">${ico('minus',28)}</button>
       <div class="valueWrap"><span class="value" style="color:${(!timed&&isPR)?'var(--pr)':'var(--accent)'}">${d.weight}</span><span class="unit">kg</span></div>
       <button class="stepperBtn tap" data-a="wplus">${ico('plus',28)}</button>
     </div>
     ${(!timed&&isPR)?`<div class="prTag">${ico('trend',13,'#141317')} Neuer Bestwert!</div>`:''}
   </div>`}
   ${second}
   <button class="saveBtn tap" data-a="save">${ico('check',22,'#141317')} Satz speichern</button>
   ${todaySets.length?`<div class="todayBox"><div class="todayHead">Heute · ${todaySets.length} ${todaySets.length===1?'Satz':'Sätze'}</div>${todaySets.map(setRow).join('')}</div>`:''}
  `;
}

/* ---- History ---- */
function viewHistory(){
  var e=ex(ui.activeId);if(!e)return'';
  var timed=isTime(e),cardio=isCardio(e),all=setsFor(e.id);
  var byDay={};all.forEach(function(s){(byDay[s.date]=byDay[s.date]||[]).push(s);});
  var dayList=Object.keys(byDay).sort().reverse().map(function(k){
    var arr=byDay[k].sort(function(a,b){return a.ts-b.ts;});
    return {key:k,sets:arr,topW:Math.max.apply(null,arr.map(function(s){return s.weight||0;})),topT:Math.max.apply(null,arr.map(function(s){return s.seconds||0;})),sumK:arr.reduce(function(a,s){return a+(s.km||0);},0)};
  });
  var best=cardio?all.reduce(function(m,s){return Math.max(m,s.km||0);},0):(timed?all.reduce(function(m,s){return Math.max(m,s.seconds||0);},0):all.reduce(function(m,s){return Math.max(m,s.weight||0);},0));
  var totalK=all.reduce(function(a,s){return a+(s.km||0);},0);
  var chart=dayList.slice().reverse().map(function(dd){return {label:fmtShort(dd.key).replace(/^.. /,''),val:cardio?dd.sumK:(timed?dd.topT:dd.topW)};});

  var head=`<div class="logHeader"><button class="icon-btn tap" data-a="backlog">${ico('chevleft',24)}</button>${ico('trend',20,'#F5C518')}</div>
   <div class="logTitleWrap"><div class="eyebrow">VERLAUF${timed?' · ZEIT':''}${cardio?' · CARDIO':''}</div><h1 class="logTitle">${esc(e.name)}</h1></div>`;
  if(!all.length)return head+'<div class="empty">Noch keine Sätze aufgezeichnet. Leg im Logger los.</div>';

  var stats=cardio?`<div class="statRow">
     <div class="stat"><div class="statN">${nf1(best)}</div><div class="statL">km Bestwert</div></div>
     <div class="stat"><div class="statN">${dayList.length}</div><div class="statL">Einheiten</div></div>
     <div class="stat"><div class="statN">${nf1(totalK)}</div><div class="statL">km gesamt</div></div>
   </div>`:`<div class="statRow">
     <div class="stat"><div class="statN">${timed?fmtTimeShort(best):best}</div><div class="statL">${timed?'Bestzeit':'kg Bestwert'}</div></div>
     <div class="stat"><div class="statN">${dayList.length}</div><div class="statL">Trainings</div></div>
     <div class="stat"><div class="statN">${all.length}</div><div class="statL">Sätze gesamt</div></div>
   </div>`;

  var chartHtml='';
  if(chart.length>1){
    var W=420,H=150,pad=26;
    var max=Math.max.apply(null,chart.map(function(c){return c.val;}))||1;
    var min=Math.min.apply(null,chart.map(function(c){return c.val;}));
    var span=(max-min)||1;
    var n=chart.length;
    var pts=chart.map(function(c,i){
      var x=pad+(n===1?0:i*(W-2*pad)/(n-1));
      var y=H-pad-((c.val-min)/span)*(H-2*pad);
      return {x:x,y:y,c:c};
    });
    var line=pts.map(function(p,i){return (i?'L':'M')+p.x.toFixed(1)+' '+p.y.toFixed(1);}).join(' ');
    var dots=pts.map(function(p){return '<circle cx="'+p.x.toFixed(1)+'" cy="'+p.y.toFixed(1)+'" r="3" fill="#F5C518"/>';}).join('');
    var grid=[0,.5,1].map(function(f){var y=pad+f*(H-2*pad);return '<line x1="'+pad+'" y1="'+y+'" x2="'+(W-pad+6)+'" y2="'+y+'" stroke="#38353F" stroke-dasharray="2 4"/>';}).join('');
    var labs='<text x="'+pad+'" y="'+(H-6)+'" fill="#8C8895" font-size="9" font-family="Inter">'+esc(chart[0].label)+'</text>'+
             '<text x="'+(W-pad)+'" y="'+(H-6)+'" fill="#8C8895" font-size="9" font-family="Inter" text-anchor="end">'+esc(chart[n-1].label)+'</text>';
    var yhi='<text x="'+(pad-4)+'" y="'+(pad+3)+'" fill="#8C8895" font-size="9" font-family="Inter" text-anchor="end">'+(cardio?nf1(max):(timed?fmtTimeShort(max):max))+'</text>';
    chartHtml=`<div class="chartBox"><div class="chartLabel">${cardio?'DISTANZ PRO EINHEIT (KM)':(timed?'BESTE ZEIT PRO TRAINING':'GEWICHT PRO TRAINING')}</div>
      <svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block">${grid}${yhi}<path d="${line}" fill="none" stroke="#F5C518" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>${dots}${labs}</svg></div>`;
  }

  var days=dayList.map(function(d){
    return '<div class="dayBlock"><div class="dayHead"><span class="dayDate">'+fmtShort(d.key)+'</span><span class="dayRel">'+relDays(d.key)+'</span></div>'+
      d.sets.map(function(s,i){
        var pr=isCardio(s)?((s.km||0)===best&&best>0):(timed?(s.seconds===best&&best>0):(s.weight===best&&best>0));
        var col=pr?'var(--pr)':'var(--text)';
        var val,vol;
        if(isCardio(s)){
          val='<b style="font-family:var(--display);color:'+col+'">'+nf1(s.km||0)+'</b> km'+(s.seconds?' · '+fmtTimeShort(s.seconds):'');
          vol='<span class="setVol">'+fmtPace(s.seconds,s.km)+'</span>';
        }else if(isTime(s)){
          val=(s.weight>0?'<b style="font-family:var(--display);color:var(--text)">'+s.weight+'</b> kg · ':'')+'<b style="font-family:var(--display);color:'+col+'">'+fmtTimeShort(s.seconds)+'</b>';vol='';
        }else{
          val='<b style="font-family:var(--display);color:'+col+'">'+s.weight+'</b> kg × '+s.reps;
          vol='<span class="setVol">'+nf(s.weight*s.reps)+' kg</span>';
        }
        return '<div class="setRow"><span class="setNo">'+(i+1)+'</span><span class="setVal">'+val+(pr?' '+ico('trend',13,'#5FD08A'):'')+'</span>'+vol+
          '<button class="delBtn tap" data-a="delset" data-id="'+s.id+'">'+ico('trash',15,'#8C8895')+'</button></div>';
      }).join('')+'</div>';
  }).join('');

  return head+stats+chartHtml+'<div style="margin-top:18px">'+days+'</div>';
}

/* ---- Modals ---- */
function modalAdd(){
  var edit=ui.editExId?ex(ui.editExId):null;
  var dr=ui.addDraft||(ui.addDraft={name:'',group:'Brust',bw:false,mode:'reps'});
  var nSets=edit?setsFor(edit.id).length:0;
  return `<div class="modalWrap" data-a="closemodal"><div class="modal" data-stop="1">
    <div class="modalHead"><h2 class="modalTitle">${edit?'Übung bearbeiten':'Neue Übung'}</h2><button class="icon-btn tap" data-a="closemodal">${ico('x',22,'#8C8895')}</button></div>
    <input id="addName" class="modalInput" placeholder="Name der Übung" value="${esc(dr.name)}">
    <div class="modeToggle">
      <button class="modeBtn tap${dr.mode==='reps'?' on':''}" data-a="amode" data-v="reps">${ico('dumbbell',15)} Wdh.</button>
      <button class="modeBtn tap${dr.mode==='time'?' on':''}" data-a="amode" data-v="time">${ico('timer',15)} Zeit</button>
      <button class="modeBtn tap${dr.mode==='cardio'?' on':''}" data-a="amode" data-v="cardio">${ico('run',15)} Cardio</button>
    </div>
    <div class="chips" style="margin-top:14px">${GROUPS.filter(function(g){return g!=='Alle';}).map(function(g){return `<button class="chip tap${dr.group===g?' on':''}" data-a="agroup" data-v="${g}">${g}</button>`;}).join('')}</div>
    ${dr.mode==='cardio'?'':`<label class="bwRow"><input type="checkbox" id="addBw" ${dr.bw?'checked':''}><span>Körpergewichts-Übung (startet bei 0 kg Zusatz)</span></label>`}
    <button class="saveBtn tap" data-a="asubmit" style="margin-top:20px;opacity:${dr.name.trim()?1:.4}">${edit?ico('check',20,'#141317')+' Speichern':ico('plus',20,'#141317')+' Hinzufügen'}</button>
    ${edit?`<button class="moreBtn tap" data-a="exdel" style="margin-top:10px;color:var(--danger);border-color:var(--danger);display:flex;align-items:center;justify-content:center;gap:7px">${ico('trash',15,'var(--danger)')} Übung löschen${nSets?' · '+nSets+' Sätze bleiben im Backup':''}</button>`:''}
  </div></div>`;
}
function modalPlanNew(){
  var edit=!!ui.editPlanId;
  var dr=ui.planDraft||(ui.planDraft={name:''});
  return `<div class="modalWrap" data-a="closemodal"><div class="modal" data-stop="1">
    <div class="modalHead"><h2 class="modalTitle">${edit?'Plan umbenennen':'Neuer Plan'}</h2><button class="icon-btn tap" data-a="closemodal">${ico('x',22,'#8C8895')}</button></div>
    <input id="planName" class="modalInput" placeholder="Name (z. B. Push, Oberkörper …)" value="${esc(dr.name)}">
    <button class="saveBtn tap" data-a="plansubmit" style="margin-top:20px;opacity:${dr.name.trim()?1:.4}">${edit?ico('check',20,'#141317')+' Speichern':ico('plus',20,'#141317')+' Anlegen'}</button>
  </div></div>`;
}
function modalPickEx(){
  var p=plan(ui.activePlanId);if(!p)return'';
  var q=(ui.pickQ||'').toLowerCase();
  var avail=data.exercises.filter(function(e){
    return !e.archived&&p.exIds.indexOf(e.id)<0&&(!q||e.name.toLowerCase().indexOf(q)>=0);});
  avail=avail.slice().sort(function(a,b){return (b.fav?1:0)-(a.fav?1:0);});
  var rows=avail.map(function(e){
    return `<button class="menuItem tap" data-a="pickex" data-id="${e.id}">${ico('plus',17,'#F5C518')}
      <div><div>${e.fav?'<span style="color:var(--accent);font-size:11px">★</span> ':''}${esc(e.name)}</div><div class="menuSub">${esc(e.group)}${isTime(e)?' · Zeit':''}</div></div></button>`;
  }).join('');
  return `<div class="modalWrap" data-a="closemodal"><div class="modal" data-stop="1">
    <div class="modalHead"><h2 class="modalTitle">Übung hinzufügen</h2><button class="icon-btn tap" data-a="closemodal">${ico('x',22,'#8C8895')}</button></div>
    <input id="pickQ" class="modalInput" placeholder="Übung suchen…" value="${esc(ui.pickQ||'')}">
    <div style="max-height:46vh;overflow-y:auto;margin-top:8px">${rows||'<div class="empty" style="padding:20px">Keine passende Übung.</div>'}</div>
  </div></div>`;
}
function modalBw(){
  var recent=data.body.slice().sort(function(a,b){return a.date<b.date?1:-1;}).slice(0,5);
  var rows=recent.map(function(b){
    return `<div class="setRow"><span class="setVal"><b>${nf(b.kg)}</b> kg</span><span class="setVol">${fmtShort(b.date)}</span>
      <button class="delBtn tap" data-a="bwdel" data-id="${b.date}">${ico('trash',15,'#8C8895')}</button></div>`;
  }).join('');
  return `<div class="modalWrap" data-a="closemodal"><div class="modal" data-stop="1">
    <div class="modalHead"><h2 class="modalTitle">Körpergewicht</h2><button class="icon-btn tap" data-a="closemodal">${ico('x',22,'#8C8895')}</button></div>
    <input id="bwVal" class="modalInput" type="number" step="0.1" inputmode="decimal" placeholder="Gewicht in kg" value="${ui.bwDraft||''}">
    <button class="saveBtn tap" data-a="bwsubmit" style="margin-top:16px">${ico('check',20,'#141317')} Für heute speichern</button>
    ${rows?'<div style="margin-top:14px">'+rows+'</div><div class="hintSub">Ein Eintrag pro Tag – erneutes Speichern überschreibt heute.</div>':''}
  </div></div>`;
}
function modalMenu(){
  return `<div class="modalWrap" data-a="closemodal"><div class="modal" data-stop="1">
    <div class="modalHead"><h2 class="modalTitle">Daten & Sicherung</h2><button class="icon-btn tap" data-a="closemodal">${ico('x',22,'#8C8895')}</button></div>
    <button class="menuItem tap" data-a="exportjson">${ico('download',20,'#F5C518')}<div><div>Backup exportieren (.json)</div><div class="menuSub">Vollständige Sicherung – zum Wiederherstellen oder aufs neue Handy</div></div></button>
    <button class="menuItem tap" data-a="exportcsv">${ico('share',20,'#F5C518')}<div><div>Als Tabelle exportieren (.csv)</div><div class="menuSub">Öffnet sich in Excel / Google Sheets</div></div></button>
    <button class="menuItem tap" data-a="importjson">${ico('upload',20,'#F5C518')}<div><div>Backup importieren</div><div class="menuSub">Ersetzt die aktuellen Daten durch eine .json-Sicherung</div></div></button>
  </div></div>`;
}

/* ============ export / import ============ */
function download(filename,text,type){
  var blob=new Blob([text],{type:type||'application/json'});
  var url=URL.createObjectURL(blob);var a=document.createElement('a');
  a.href=url;a.download=filename;document.body.appendChild(a);a.click();
  setTimeout(function(){URL.revokeObjectURL(url);a.remove();},500);
}
function exportJson(){
  var payload={app:'gym-log',version:2,exportedAt:new Date().toISOString(),exercises:data.exercises,sets:data.sets,plans:data.plans,body:data.body};
  download('gymlog-backup-'+dayKey(new Date())+'.json',JSON.stringify(payload,null,2));
  toast('Backup exportiert');
}
function exportCsv(){
  var byId={};data.exercises.forEach(function(e){byId[e.id]=e;});
  var rows=[['Datum','Uhrzeit','Übung','Gruppe','Typ','Gewicht_kg','Wiederholungen','Zeit_Sek','Distanz_km','Volumen_kg']];
  data.sets.slice().sort(function(a,b){return a.ts-b.ts;}).forEach(function(s){
    var e=byId[s.exerciseId]||{name:s.exerciseId,group:''};
    var t=new Date(s.ts);
    rows.push([s.date,String(t.getHours()).padStart(2,'0')+':'+String(t.getMinutes()).padStart(2,'0'),
      e.name,e.group,s.mode==='time'?'Zeit':(s.mode==='cardio'?'Cardio':'Wdh.'),s.weight,s.mode==='reps'?(s.reps||0):'',(s.mode==='time'||s.mode==='cardio')?(s.seconds||0):'',s.mode==='cardio'?(s.km||0):'',setVol(s)]);
  });
  var csv=rows.map(function(r){return r.map(function(c){var v=String(c);return /[",;\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v;}).join(';');}).join('\n');
  download('gymlog-'+dayKey(new Date())+'.csv','\ufeff'+csv,'text/csv');
  toast('CSV exportiert');
}
function importJson(){document.getElementById('fileIn').click();}
document.getElementById('fileIn').addEventListener('change',function(ev){
  var f=ev.target.files[0];if(!f)return;var r=new FileReader();
  r.onload=function(){
    try{var p=JSON.parse(r.result);
      if(!p.sets||!p.exercises)throw 0;
      if(!confirm('Backup importieren? Deine aktuellen Daten werden ersetzt.\n\nGefunden: '+p.exercises.length+' Übungen, '+p.sets.length+' Sätze.'))return;
      data={exercises:p.exercises,sets:p.sets,plans:(p.plans&&p.plans.length)?p.plans:defaultPlans(),body:p.body||[]};migrate();save();ui.modal=null;ui.view='home';render();toast('Backup wiederhergestellt');
    }catch(e){alert('Diese Datei konnte nicht gelesen werden. Bitte eine gültige Gym-Log-Sicherung (.json) wählen.');}
  };r.readAsText(f);ev.target.value='';
});

/* ============ stopwatch ============ */
function toggleWatch(){
  var w=ui.watch;
  if(w.running){ui.draft.seconds=w.elapsed;w.running=false;clearInterval(w.int);w.elapsed=0;if(navigator.vibrate)navigator.vibrate(15);render();}
  else{w.running=true;w.start=Date.now();w.elapsed=0;
    w.int=setInterval(function(){w.elapsed=Math.round((Date.now()-w.start)/1000);
      var b=document.querySelector('[data-a="watch"]');if(b)b.innerHTML=ico('square',16,'#141317')+' Stoppen · '+fmtTimeShort(w.elapsed);},250);
    render();}
}
function stopWatchSilently(){var w=ui.watch;if(w.int)clearInterval(w.int);w.running=false;w.elapsed=0;}

/* ============ navigation ============ */
function go(view,id){
  stopWatchSilently();
  ui.view=view;if(id!==undefined)ui.activeId=id;
  if(view==='log'){var e=ex(ui.activeId);ensureDraft(e);}
  window.scrollTo(0,0);render();
}

/* ============ event delegation ============ */
document.addEventListener('click',function(ev){
  var t=ev.target.closest('[data-a]');
  if(!t)return;
  /* Taps im Modal-Sheet (data-stop) dürfen nicht das Backdrop-closemodal auslösen */
  if(t.classList.contains('modalWrap')&&ev.target.closest('[data-stop]'))return;
  var a=t.getAttribute('data-a'),v=t.getAttribute('data-v'),id=t.getAttribute('data-id');
  var d=ui.draft;
  switch(a){
    case'menu':ui.modal='menu';renderModal();break;
    case'add':ui.editExId=null;ui.addDraft={name:'',group:ui.filter!=='Alle'&&ui.filter!=='fav'?ui.filter:'Brust',bw:false,mode:'reps'};ui.modal='add';ui.focus='addName';renderModal();break;
    case'exedit':{var ee=ex(ui.activeId);if(!ee)break;ui.editExId=ee.id;
      ui.addDraft={name:ee.name,group:ee.group,bw:!!ee.bw,mode:ee.mode||'reps'};ui.modal='add';ui.focus=null;renderModal();break;}
    case'exdel':{var de=ex(ui.editExId);if(!de)break;var dn=setsFor(de.id).length;
      if(!confirm('"'+de.name+'" löschen? Die Übung verschwindet aus der App'+(dn?', deine '+dn+' Sätze bleiben in den Daten und im Backup erhalten':'')+'.'))break;
      archiveExercise(de.id);ui.modal=null;ui.editExId=null;ui.draft=null;go('home');toast('Übung gelöscht');break;}
    case'closemodal':ui.modal=null;ui.focus=null;ui.editExId=null;ui.editPlanId=null;renderModal();break;
    case'filter':ui.filter=v;ui.focus=null;render();break;
    case'clearq':ui.query='';ui.focus=null;render();break;
    case'open':ui.origin=ui.view;go('log',id);break;
    case'tab':ui.tlAll=false;ui.prAll=false;go(v);break;
    case'musclego':ui.filter=v;ui.query='';go('home');break;
    case'tlmore':ui.tlAll=true;render();break;
    case'prmore':ui.prAll=true;render();break;
    case'favtoggle':{var fe=ex(ui.activeId);fe.fav=!fe.fav;save();render();toast(fe.fav?'Als Favorit markiert':'Favorit entfernt');break;}
    case'planopen':ui.activePlanId=id;go('plan');break;
    case'planback':go('plans');break;
    case'plannew':ui.editPlanId=null;ui.planDraft={name:''};ui.modal='plannew';ui.focus='planName';renderModal();break;
    case'planedit':{var ep=plan(ui.activePlanId);if(!ep)break;ui.editPlanId=ep.id;ui.planDraft={name:ep.name};ui.modal='plannew';ui.focus='planName';renderModal();break;}
    case'plansubmit':{var pn=(document.getElementById('planName').value||'').trim();if(!pn)return;
      if(ui.editPlanId){var rp=plan(ui.editPlanId);if(rp){rp.name=pn;save();}
        ui.modal=null;ui.focus=null;ui.editPlanId=null;render();toast('Plan umbenannt');break;}
      var np={id:'plan-'+Date.now(),name:pn,exIds:[]};data.plans.push(np);save();
      ui.modal=null;ui.focus=null;ui.activePlanId=np.id;go('plan');toast('Plan angelegt');break;}
    case'plandel':{var dp=plan(ui.activePlanId);if(!dp)break;
      if(!confirm('Plan "'+dp.name+'" löschen? Deine geloggten Sätze bleiben erhalten.'))break;
      data.plans=data.plans.filter(function(x){return x.id!==dp.id;});save();go('plans');toast('Plan gelöscht');break;}
    case'planaddex':ui.pickQ='';ui.modal='pickex';ui.focus='pickQ';renderModal();break;
    case'pickex':{var pp=plan(ui.activePlanId);if(pp&&pp.exIds.indexOf(id)<0){pp.exIds.push(id);save();}
      ui.modal=null;ui.focus=null;render();toast('Übung im Plan');break;}
    case'planremex':{var pr=plan(ui.activePlanId);if(pr){pr.exIds=pr.exIds.filter(function(x){return x!==id;});save();render();}break;}
    case'bwadd':ui.bwDraft='';ui.modal='bw';ui.focus='bwVal';renderModal();break;
    case'bwsubmit':{var bv=parseFloat(String(document.getElementById('bwVal').value).replace(',','.'));
      if(!bv||bv<=0){return;}
      var bd=dayKey(new Date());
      data.body=data.body.filter(function(b){return b.date!==bd;});
      data.body.push({date:bd,kg:Math.round(bv*10)/10,ts:Date.now()});save();
      ui.modal=null;ui.focus=null;ui.bwDraft='';render();toast('Gewicht gespeichert');break;}
    case'bwdel':data.body=data.body.filter(function(b){return b.date!==id;});save();renderModal();render();break;
    case'back':go(ui.origin==='progress'?'progress':(ui.origin==='plan'?'plan':'home'));break;
    case'gohist':go('history');break;
    case'backlog':go('log');break;
    case'wminus':d.weight=Math.max(0,Math.round((d.weight-d.step)*10)/10);render();break;
    case'wplus':d.weight=Math.round((d.weight+d.step)*10)/10;render();break;
    case'wstep':d.step=parseFloat(v);render();break;
    case'kminus':d.km=Math.max(0,Math.round((d.km-d.kStep)*10)/10);render();break;
    case'kplus':d.km=Math.round((d.km+d.kStep)*10)/10;render();break;
    case'kstep':d.kStep=parseFloat(v);render();break;
    case'rminus':d.reps=Math.max(0,d.reps-1);render();break;
    case'rplus':d.reps=d.reps+1;render();break;
    case'tminus':d.seconds=Math.max(0,d.seconds-d.tStep);render();break;
    case'tplus':d.seconds=d.seconds+d.tStep;render();break;
    case'tstep':d.tStep=parseInt(v,10);render();break;
    case'watch':toggleWatch();break;
    case'save':{var e=ex(ui.activeId);addSet(e.id,isCardio(e)?{km:d.km,seconds:d.seconds,mode:'cardio'}:(isTime(e)?{weight:d.weight,seconds:d.seconds,mode:'time'}:{weight:d.weight,reps:d.reps,mode:'reps'}));render();break;}
    case'delset':delSet(id);render();break;
    case'amode':ui.addDraft.mode=v;renderModal();break;
    case'agroup':ui.addDraft.group=v;renderModal();break;
    case'asubmit':{var dr=ui.addDraft;var bwEl=document.getElementById('addBw');var bw=dr.mode==='cardio'?true:(bwEl?bwEl.checked:false);
      var name=(document.getElementById('addName').value||'').trim();if(!name){return;}
      if(ui.editExId){updateExercise(ui.editExId,{name:name,group:dr.group,bw:bw,mode:dr.mode});
        ui.modal=null;ui.focus=null;ui.editExId=null;ui.draft=null;render();toast('Übung gespeichert');break;}
      addExercise(name,dr.group,bw,dr.mode);ui.modal=null;ui.focus=null;ui.filter=dr.group;render();toast('Übung hinzugefügt');break;}
    case'exportjson':exportJson();break;
    case'exportcsv':exportCsv();break;
    case'importjson':importJson();break;
  }
});
document.addEventListener('input',function(ev){
  if(ev.target.id==='search'){ui.query=ev.target.value;ui.focus='search';render();}
  else if(ev.target.id==='addName'){ui.addDraft.name=ev.target.value;ui.focus='addName';/* no re-render to keep caret */
    var btn=document.querySelector('[data-a="asubmit"]');if(btn)btn.style.opacity=ev.target.value.trim()?1:.4;}
  else if(ev.target.id==='planName'){ui.planDraft.name=ev.target.value;ui.focus='planName';
    var pbtn=document.querySelector('[data-a="plansubmit"]');if(pbtn)pbtn.style.opacity=ev.target.value.trim()?1:.4;}
  else if(ev.target.id==='pickQ'){ui.pickQ=ev.target.value;ui.focus='pickQ';renderModal();}
  else if(ev.target.id==='bwVal'){ui.bwDraft=ev.target.value;ui.focus='bwVal';}
});

/* ============ init ============ */
load();render();
</script>
</body>
</html>
